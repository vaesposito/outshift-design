<svg width="1147" height="420" viewBox="0 0 1147 420" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="#1a1d27"/><stop offset="100%" stop-color="#22263a"/></linearGradient>
  <linearGradient id="border" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="rgba(255,255,255,0.12)"/><stop offset="100%" stop-color="rgba(255,255,255,0.04)"/></linearGradient>
</defs>
<rect width="1147" height="420" rx="16" fill="url(#bg)"/>
<rect x="0.5" y="0.5" width="1146" height="419" rx="15.5" stroke="url(#border)"/>

<text x="48" y="52" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" letter-spacing="1.5">DECISION EXPLANATION</text>

<!-- Decision card -->
<rect x="48" y="72" width="1051" height="300" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- Decision header -->
<rect x="72" y="92" width="1004" height="64" rx="10" fill="rgba(0,188,235,0.04)" stroke="rgba(0,188,235,0.12)" stroke-width="1"/>
<text x="96" y="116" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">DECISION MADE</text>
<text x="96" y="140" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500">Selected React Server Components over traditional SSR for the dashboard rebuild</text>

<!-- Why section -->
<text x="72" y="188" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Why this choice?</text>

<!-- Factor cards in a row -->
<rect x="72" y="204" width="240" height="100" rx="8" fill="rgba(52,199,89,0.04)" stroke="rgba(52,199,89,0.12)" stroke-width="1"/>
<text x="92" y="228" fill="#34c759" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">FOR</text>
<text x="92" y="248" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">40% faster initial load</text>
<text x="92" y="268" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Benchmark: 1.2s vs 2.0s</text>
<text x="92" y="288" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Weight: High impact</text>

<rect x="328" y="204" width="240" height="100" rx="8" fill="rgba(52,199,89,0.04)" stroke="rgba(52,199,89,0.12)" stroke-width="1"/>
<text x="348" y="228" fill="#34c759" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">FOR</text>
<text x="348" y="248" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Reduced client bundle</text>
<text x="348" y="268" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">-65KB gzipped JS shipped</text>
<text x="348" y="288" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Weight: Medium impact</text>

<rect x="584" y="204" width="240" height="100" rx="8" fill="rgba(255,175,0,0.04)" stroke="rgba(255,175,0,0.12)" stroke-width="1"/>
<text x="604" y="228" fill="#ffaf00" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">TRADE-OFF</text>
<text x="604" y="248" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Learning curve for team</text>
<text x="604" y="268" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">~2 week ramp-up estimated</text>
<text x="604" y="288" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Weight: Acceptable risk</text>

<rect x="840" y="204" width="240" height="100" rx="8" fill="rgba(255,69,58,0.04)" stroke="rgba(255,69,58,0.12)" stroke-width="1"/>
<text x="860" y="228" fill="#ff453a" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">REJECTED ALTERNATIVE</text>
<text x="860" y="248" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Traditional SSR</text>
<text x="860" y="268" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Higher maintenance overhead</text>
<text x="860" y="288" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Weight: Strong against</text>

<!-- Bottom action bar -->
<line x1="72" y1="324" x2="1076" y2="324" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<text x="96" y="350" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">Do you agree with this decision?</text>
<rect x="316" y="334" width="100" height="30" rx="6" fill="#00BCEB"/>
<text x="366" y="353" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Agree</text>
<rect x="428" y="334" width="100" height="30" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="478" y="353" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Challenge</text>
<rect x="540" y="334" width="140" height="30" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="610" y="353" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Explore Alternatives</text>
</svg>