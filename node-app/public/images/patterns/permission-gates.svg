<svg width="1147" height="420" viewBox="0 0 1147 420" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="#1a1d27"/><stop offset="100%" stop-color="#22263a"/></linearGradient>
  <linearGradient id="border" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="rgba(255,255,255,0.12)"/><stop offset="100%" stop-color="rgba(255,255,255,0.04)"/></linearGradient>
</defs>
<rect width="1147" height="420" rx="16" fill="url(#bg)"/>
<rect x="0.5" y="0.5" width="1146" height="419" rx="15.5" stroke="url(#border)"/>

<text x="48" y="52" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" letter-spacing="1.5">PERMISSION GATES</text>

<!-- Chat context on left -->
<rect x="48" y="72" width="480" height="300" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<text x="72" y="104" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Agent Conversation</text>

<!-- User message -->
<rect x="200" y="128" width="304" height="48" rx="10" fill="rgba(0,188,235,0.12)" stroke="rgba(0,188,235,0.25)" stroke-width="1"/>
<text x="216" y="148" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="13">Reschedule my 3pm meeting with</text>
<text x="216" y="164" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="13">the design team to tomorrow</text>

<!-- Agent response -->
<rect x="72" y="192" width="340" height="36" rx="10" fill="rgba(255,255,255,0.06)"/>
<circle cx="92" cy="210" r="10" fill="rgba(0,188,235,0.2)"/>
<text x="92" y="214" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle" font-weight="700">AI</text>
<text x="112" y="214" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="13">I'll need to access your calendar...</text>

<!-- Pending state indicator -->
<rect x="72" y="248" width="340" height="44" rx="10" fill="rgba(255,175,0,0.06)" stroke="rgba(255,175,0,0.2)" stroke-width="1"/>
<circle cx="92" cy="270" r="8" fill="rgba(255,175,0,0.2)"/>
<text x="92" y="274" fill="#ffaf00" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">⏳</text>
<text x="112" y="266" fill="#ffaf00" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Awaiting permission...</text>
<text x="112" y="282" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Agent paused until you approve</text>

<!-- Permission dialog on right -->
<rect x="580" y="72" width="519" height="300" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- Permission request card -->
<rect x="616" y="100" width="447" height="240" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

<!-- Shield icon -->
<circle cx="840" cy="136" r="20" fill="rgba(0,188,235,0.1)" stroke="rgba(0,188,235,0.3)" stroke-width="1.5"/>
<text x="840" y="142" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="16" text-anchor="middle">🛡</text>

<text x="840" y="172" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="middle">Permission Required</text>
<text x="840" y="196" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">The agent wants to modify your calendar</text>

<!-- Action details -->
<rect x="648" y="216" width="383" height="56" rx="8" fill="rgba(255,255,255,0.04)"/>
<text x="672" y="238" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Action:</text>
<text x="726" y="238" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="12">Reschedule "Design Team Sync"</text>
<text x="672" y="258" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Impact:</text>
<text x="722" y="258" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="12">5 team members will be notified</text>

<!-- Buttons -->
<rect x="648" y="288" width="185" height="40" rx="8" fill="#00BCEB"/>
<text x="740" y="313" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Approve</text>
<rect x="846" y="288" width="185" height="40" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
<text x="938" y="313" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" text-anchor="middle">Deny</text>
</svg>