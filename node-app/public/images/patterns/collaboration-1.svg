<svg width="1147" height="420" viewBox="0 0 1147 420" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="#1a1d27"/><stop offset="100%" stop-color="#22263a"/></linearGradient>
  <linearGradient id="border" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="rgba(255,255,255,0.12)"/><stop offset="100%" stop-color="rgba(255,255,255,0.04)"/></linearGradient>
</defs>
<rect width="1147" height="420" rx="16" fill="url(#bg)"/>
<rect x="0.5" y="0.5" width="1146" height="419" rx="15.5" stroke="url(#border)"/>

<text x="48" y="52" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" letter-spacing="1.5">SHARED WORKSPACE</text>

<rect x="48" y="72" width="1051" height="300" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- Split view header -->
<rect x="72" y="92" width="1004" height="36" rx="8" fill="rgba(255,255,255,0.03)"/>
<text x="310" y="115" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Your Edits</text>
<text x="820" y="115" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Agent Suggestions</text>
<line x1="574" y1="96" x2="574" y2="124" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

<!-- User's side -->
<rect x="72" y="136" width="496" height="220" rx="8" fill="rgba(255,255,255,0.02)"/>
<text x="92" y="164" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500">Project Proposal Draft</text>
<line x1="92" y1="176" x2="548" y2="176" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<text x="92" y="200" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="12">Our platform enables teams to collaborate</text>
<text x="92" y="220" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="12">more effectively through AI-assisted</text>
<text x="92" y="240" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="12">workflows and intelligent automation.</text>

<!-- Highlight showing user's cursor/selection -->
<rect x="92" y="260" width="340" height="20" rx="2" fill="rgba(0,188,235,0.1)"/>
<text x="92" y="276" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="12">The key differentiator is our approach to</text>
<text x="92" y="296" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="12">human-agent interaction, which maintains</text>
<text x="92" y="316" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="12">user control at every decision point.</text>

<!-- User cursor -->
<rect x="328" y="260" width="2" height="16" fill="#00BCEB"/>

<!-- Agent side -->
<rect x="580" y="136" width="496" height="220" rx="8" fill="rgba(0,188,235,0.02)"/>
<text x="600" y="164" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500">Agent's Enhancement</text>
<line x1="600" y1="176" x2="1056" y2="176" stroke="rgba(0,188,235,0.1)" stroke-width="1"/>

<text x="600" y="200" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="12">Our platform enables teams to collaborate</text>
<text x="600" y="220" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="12">more effectively through AI-assisted</text>
<text x="600" y="240" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="12">workflows and intelligent automation.</text>

<!-- Agent suggestion highlight -->
<rect x="600" y="260" width="460" height="52" rx="2" fill="rgba(52,199,89,0.06)" stroke="rgba(52,199,89,0.15)" stroke-width="1" stroke-dasharray="4 2"/>
<text x="608" y="276" fill="#34c759" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Suggested enhancement:</text>
<text x="608" y="296" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="12">Unlike existing tools, our unique approach ensures</text>
<text x="608" y="308" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="10">Click to accept · Tab to modify · Esc to dismiss</text>

<!-- Collaboration indicators at bottom -->
<text x="600" y="340" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">3 suggestions pending · 2 accepted · 1 modified</text>
</svg>