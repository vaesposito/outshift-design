<svg width="1147" height="420" viewBox="0 0 1147 420" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="#1a1d27"/><stop offset="100%" stop-color="#22263a"/></linearGradient>
  <linearGradient id="border" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="rgba(255,255,255,0.12)"/><stop offset="100%" stop-color="rgba(255,255,255,0.04)"/></linearGradient>
</defs>
<rect width="1147" height="420" rx="16" fill="url(#bg)"/>
<rect x="0.5" y="0.5" width="1146" height="419" rx="15.5" stroke="url(#border)"/>

<text x="48" y="52" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" letter-spacing="1.5">ERROR CORRECTION</text>

<rect x="48" y="72" width="1051" height="300" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- Error state -->
<rect x="72" y="92" width="500" height="256" rx="10" fill="rgba(255,69,58,0.04)" stroke="rgba(255,69,58,0.15)" stroke-width="1"/>
<circle cx="96" cy="120" r="12" fill="rgba(255,69,58,0.15)"/>
<text x="96" y="125" fill="#ff453a" font-family="Inter, system-ui, sans-serif" font-size="13" text-anchor="middle">!</text>
<text x="118" y="117" fill="#ff453a" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Agent encountered an issue</text>
<text x="118" y="135" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">The email draft contains incorrect recipient data</text>

<!-- Error details -->
<rect x="92" y="156" width="460" height="60" rx="8" fill="rgba(255,255,255,0.03)"/>
<text x="112" y="178" fill="#ff453a" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">What went wrong:</text>
<text x="112" y="198" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="12">Added 2 incorrect contacts from a similarly named project</text>

<!-- Suggested fix -->
<rect x="92" y="228" width="460" height="60" rx="8" fill="rgba(52,199,89,0.04)"/>
<text x="112" y="250" fill="#34c759" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500">Suggested correction:</text>
<text x="112" y="270" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="12">Remove J. Smith and K. Lee, add M. Chen and R. Patel instead</text>

<!-- Action buttons -->
<rect x="92" y="304" width="140" height="32" rx="6" fill="#34c759"/>
<text x="162" y="324" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Apply Fix</text>
<rect x="244" y="304" width="120" height="32" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="304" y="324" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Edit Manually</text>
<rect x="376" y="304" width="120" height="32" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="436" y="324" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Discard Draft</text>

<!-- Right: Learning prompt -->
<rect x="596" y="92" width="480" height="256" rx="10" fill="rgba(0,188,235,0.04)" stroke="rgba(0,188,235,0.12)" stroke-width="1"/>
<text x="620" y="120" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Help the agent learn</text>
<text x="620" y="142" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">Your feedback prevents similar errors in the future</text>

<text x="620" y="176" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500">What should the agent do differently?</text>

<rect x="620" y="192" width="432" height="72" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<text x="636" y="216" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12" font-style="italic">Always verify recipient names against the</text>
<text x="636" y="234" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12" font-style="italic">active project roster, not similar projects...</text>

<text x="620" y="292" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500">Apply correction to:</text>
<rect x="620" y="304" width="140" height="28" rx="6" fill="rgba(0,188,235,0.12)" stroke="#00BCEB" stroke-width="1"/>
<text x="690" y="322" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle">This task only</text>
<rect x="772" y="304" width="140" height="28" rx="6" fill="#00BCEB"/>
<text x="842" y="322" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">All future tasks</text>
</svg>