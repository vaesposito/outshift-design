<svg width="1147" height="420" viewBox="0 0 1147 420" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="#1a1d27"/><stop offset="100%" stop-color="#22263a"/></linearGradient>
  <linearGradient id="border" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="rgba(255,255,255,0.12)"/><stop offset="100%" stop-color="rgba(255,255,255,0.04)"/></linearGradient>
</defs>
<rect width="1147" height="420" rx="16" fill="url(#bg)"/>
<rect x="0.5" y="0.5" width="1146" height="419" rx="15.5" stroke="url(#border)"/>

<text x="48" y="52" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" letter-spacing="1.5">CONFIDENCE INDICATORS</text>

<!-- Main panel -->
<rect x="48" y="72" width="1051" height="300" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<text x="72" y="104" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Agent Recommendations</text>
<text x="72" y="124" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">Confidence levels help you decide which suggestions to trust</text>

<!-- High confidence card -->
<rect x="72" y="148" width="316" height="200" rx="10" fill="rgba(52,199,89,0.04)" stroke="rgba(52,199,89,0.15)" stroke-width="1"/>
<rect x="72" y="148" width="316" height="4" rx="2" fill="#34c759"/>
<text x="96" y="178" fill="#34c759" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">HIGH CONFIDENCE</text>
<text x="96" y="204" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Optimize database queries</text>
<text x="96" y="224" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">3 slow queries identified with clear</text>
<text x="96" y="240" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">optimization paths</text>
<!-- Confidence bar -->
<rect x="96" y="260" width="268" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
<rect x="96" y="260" width="248" height="6" rx="3" fill="#34c759"/>
<text x="96" y="284" fill="#34c759" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">92%</text>
<text x="140" y="284" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">based on 3 data sources</text>
<!-- Action -->
<rect x="96" y="304" width="120" height="32" rx="6" fill="#34c759"/>
<text x="156" y="324" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Apply Fix</text>
<rect x="228" y="304" width="120" height="32" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="288" y="324" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Details</text>

<!-- Medium confidence card -->
<rect x="412" y="148" width="316" height="200" rx="10" fill="rgba(255,175,0,0.04)" stroke="rgba(255,175,0,0.15)" stroke-width="1"/>
<rect x="412" y="148" width="316" height="4" rx="2" fill="#ffaf00"/>
<text x="436" y="178" fill="#ffaf00" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">MEDIUM CONFIDENCE</text>
<text x="436" y="204" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Refactor auth module</text>
<text x="436" y="224" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">Pattern detected but multiple</text>
<text x="436" y="240" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">approaches possible</text>
<rect x="436" y="260" width="268" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
<rect x="436" y="260" width="174" height="6" rx="3" fill="#ffaf00"/>
<text x="436" y="284" fill="#ffaf00" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">65%</text>
<text x="480" y="284" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">needs your review</text>
<rect x="436" y="304" width="120" height="32" rx="6" fill="rgba(255,175,0,0.15)" stroke="#ffaf00" stroke-width="1"/>
<text x="496" y="324" fill="#ffaf00" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Review</text>
<rect x="568" y="304" width="120" height="32" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="628" y="324" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Skip</text>

<!-- Low confidence card -->
<rect x="752" y="148" width="316" height="200" rx="10" fill="rgba(255,69,58,0.04)" stroke="rgba(255,69,58,0.15)" stroke-width="1"/>
<rect x="752" y="148" width="316" height="4" rx="2" fill="#ff453a"/>
<text x="776" y="178" fill="#ff453a" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">LOW CONFIDENCE</text>
<text x="776" y="204" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Migrate to microservices</text>
<text x="776" y="224" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">Significant architectural change with</text>
<text x="776" y="240" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">limited context available</text>
<rect x="776" y="260" width="268" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
<rect x="776" y="260" width="80" height="6" rx="3" fill="#ff453a"/>
<text x="776" y="284" fill="#ff453a" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">30%</text>
<text x="820" y="284" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">insufficient data</text>
<rect x="776" y="304" width="120" height="32" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="836" y="324" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Provide Context</text>
<rect x="908" y="304" width="120" height="32" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="968" y="324" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Dismiss</text>
</svg>