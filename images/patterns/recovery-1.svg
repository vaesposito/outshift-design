<svg width="1147" height="420" viewBox="0 0 1147 420" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="#1a1d27"/><stop offset="100%" stop-color="#22263a"/></linearGradient>
  <linearGradient id="border" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="rgba(255,255,255,0.12)"/><stop offset="100%" stop-color="rgba(255,255,255,0.04)"/></linearGradient>
</defs>
<rect width="1147" height="420" rx="16" fill="url(#bg)"/>
<rect x="0.5" y="0.5" width="1146" height="419" rx="15.5" stroke="url(#border)"/>

<text x="48" y="52" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" letter-spacing="1.5">UNDO &amp; ROLLBACK</text>

<!-- Action completed toast -->
<rect x="48" y="72" width="1051" height="300" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- Toast notification -->
<rect x="300" y="92" width="547" height="60" rx="12" fill="rgba(52,199,89,0.08)" stroke="rgba(52,199,89,0.25)" stroke-width="1"/>
<circle cx="332" cy="122" r="14" fill="rgba(52,199,89,0.15)"/>
<text x="332" y="127" fill="#34c759" font-family="Inter, system-ui, sans-serif" font-size="14" text-anchor="middle">✓</text>
<text x="356" y="116" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Agent deployed 3 configuration changes</text>
<text x="356" y="136" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Applied to production · 12 seconds ago</text>
<rect x="736" y="106" width="80" height="32" rx="6" fill="rgba(255,175,0,0.15)" stroke="#ffaf00" stroke-width="1"/>
<text x="776" y="126" fill="#ffaf00" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Undo</text>

<!-- Actions timeline -->
<text x="72" y="188" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Recent Agent Actions</text>
<text x="72" y="206" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">Each action can be individually reversed within 5 minutes</text>

<!-- Action 1 -->
<rect x="72" y="224" width="490" height="56" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<circle cx="96" cy="252" r="8" fill="rgba(52,199,89,0.15)"/>
<text x="96" y="256" fill="#34c759" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">✓</text>
<text x="116" y="248" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="13">Updated cache timeout to 300s</text>
<text x="116" y="264" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Config change · 12s ago</text>
<rect x="480" y="240" width="64" height="24" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="512" y="256" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Undo</text>

<!-- Action 2 -->
<rect x="72" y="288" width="490" height="56" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
<circle cx="96" cy="316" r="8" fill="rgba(52,199,89,0.15)"/>
<text x="96" y="320" fill="#34c759" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">✓</text>
<text x="116" y="312" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="13">Enabled rate limiting on /api/search</text>
<text x="116" y="328" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Security config · 12s ago</text>
<rect x="480" y="304" width="64" height="24" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="512" y="320" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Undo</text>

<!-- Right side: Undo confirmation dialog -->
<rect x="610" y="184" width="460" height="172" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
<text x="634" y="214" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600">Confirm Rollback</text>
<text x="634" y="238" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">This will revert "Updated cache timeout" to its</text>
<text x="634" y="256" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">previous value of 60s</text>

<rect x="634" y="272" width="412" height="36" rx="6" fill="rgba(255,255,255,0.03)"/>
<text x="654" y="294" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="12">cache_timeout: </text>
<text x="749" y="294" fill="#ff453a" font-family="Inter, system-ui, sans-serif" font-size="12" text-decoration="line-through">300s</text>
<text x="785" y="294" fill="#34c759" font-family="Inter, system-ui, sans-serif" font-size="12">→ 60s</text>

<rect x="634" y="320" width="140" height="28" rx="6" fill="rgba(255,175,0,0.15)" stroke="#ffaf00" stroke-width="1"/>
<text x="704" y="338" fill="#ffaf00" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Confirm Undo</text>
<rect x="786" y="320" width="100" height="28" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="836" y="338" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Cancel</text>
</svg>