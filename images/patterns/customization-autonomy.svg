<rect x="496" y="148" width="196" height="200" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<circle cx="594" cy="184" r="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
<text x="594" y="190" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="18" text-anchor="middle">⚡</text>
<text x="594" y="226" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Autonomous</text>
<text x="594" y="248" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Acts independently,</text>
<text x="594" y="262" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">reports after</text>
<!-- Progress dots -->
<circle cx="574" y="300" r="4" fill="rgba(255,255,255,0.2)"/>
<circle cx="588" y="300" r="4" fill="rgba(255,255,255,0.2)"/>
<circle cx="602" y="300" r="4" fill="rgba(255,255,255,0.2)"/>
