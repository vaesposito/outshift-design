<text x="170" y="332" fill="#555d6b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Lowest autonomy</text>

<!-- Level 2: Guided - SELECTED -->
<rect x="284" y="148" width="196" height="200" rx="10" fill="rgba(0,188,235,0.06)" stroke="#00BCEB" stroke-width="2"/>
<circle cx="382" cy="184" r="24" fill="rgba(0,188,235,0.12)" stroke="#00BCEB" stroke-width="1.5"/>
