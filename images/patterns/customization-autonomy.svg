<circle cx="170" cy="184" r="24" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
<text x="170" y="190" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="18" text-anchor="middle">👁</text>
<text x="170" y="226" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Supervised</text>
<text x="170" y="248" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Asks before</text>
<text x="170" y="262" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">every action</text>
