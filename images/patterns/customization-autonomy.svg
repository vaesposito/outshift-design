<text x="382" y="226" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Guided</text>
<text x="382" y="248" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Asks only for</text>
