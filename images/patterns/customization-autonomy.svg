<rect x="348" y="154" width="68" height="20" rx="4" fill="#00BCEB"/>
<text x="382" y="168" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">ACTIVE</text>
