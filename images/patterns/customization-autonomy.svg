<text x="594" y="332" fill="#555d6b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Highest autonomy</text>

<!-- Right side: Current config summary -->
<rect x="776" y="72" width="323" height="300" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<text x="800" y="104" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Current Configuration</text>

<rect x="800" y="128" width="275" height="52" rx="8" fill="rgba(0,188,235,0.06)"/>
<text x="824" y="150" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Guided Mode Active</text>
<text x="824" y="168" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Agent asks for important decisions only</text>

<text x="800" y="208" fill="#c0c8d8" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500">What this means:</text>

<text x="820" y="232" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">✓  Routine tasks run automatically</text>
<text x="820" y="256" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">✓  High-impact actions need approval</text>
<text x="820" y="280" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">✓  You get summaries of actions taken</text>
<text x="820" y="304" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">✓  Override agent decisions anytime</text>

<rect x="800" y="330" width="275" height="32" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="938" y="350" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12" text-anchor="middle">Advanced Settings →</text>
