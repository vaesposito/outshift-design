<svg width="1147" height="420" viewBox="0 0 1147 420" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="#1a1d27"/><stop offset="100%" stop-color="#22263a"/></linearGradient>
  <linearGradient id="border" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="rgba(255,255,255,0.12)"/><stop offset="100%" stop-color="rgba(255,255,255,0.04)"/></linearGradient>
</defs>
<rect width="1147" height="420" rx="16" fill="url(#bg)"/>
<rect x="0.5" y="0.5" width="1146" height="419" rx="15.5" stroke="url(#border)"/>

<!-- Title -->
<text x="48" y="52" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" letter-spacing="1.5">SCOPE &amp; BOUNDARIES</text>

<!-- Agent scope panel -->
<rect x="48" y="72" width="500" height="300" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<text x="72" y="104" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Agent Scope Settings</text>
<text x="72" y="124" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">Define what the agent can access and modify</text>

<!-- Toggle rows -->
<!-- Row 1: Calendar - ON -->
<rect x="72" y="148" width="452" height="48" rx="8" fill="rgba(255,255,255,0.03)"/>
<circle cx="96" cy="172" r="10" fill="rgba(0,188,235,0.15)" stroke="#00BCEB" stroke-width="1.5"/>
<text x="96" y="176" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" font-weight="600">✓</text>
<text x="118" y="169" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Access calendar events</text>
<text x="118" y="184" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Read and create calendar entries</text>
<rect x="460" y="164" width="40" height="20" rx="10" fill="#00BCEB"/>
<circle cx="488" cy="174" r="7" fill="white"/>

<!-- Row 2: Email - ON -->
<rect x="72" y="204" width="452" height="48" rx="8" fill="rgba(255,255,255,0.03)"/>
<circle cx="96" cy="228" r="10" fill="rgba(0,188,235,0.15)" stroke="#00BCEB" stroke-width="1.5"/>
<text x="96" y="232" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" font-weight="600">✓</text>
<text x="118" y="225" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Send and read emails</text>
<text x="118" y="240" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Draft and respond to messages on your behalf</text>
<rect x="460" y="220" width="40" height="20" rx="10" fill="#00BCEB"/>
<circle cx="488" cy="230" r="7" fill="white"/>

<!-- Row 3: Financial - OFF -->
<rect x="72" y="260" width="452" height="48" rx="8" fill="rgba(255,255,255,0.03)"/>
<circle cx="96" cy="284" r="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
<text x="118" y="281" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Access financial data</text>
<text x="118" y="296" fill="#555d6b" font-family="Inter, system-ui, sans-serif" font-size="11">View and modify financial records</text>
<rect x="460" y="276" width="40" height="20" rx="10" fill="rgba(255,255,255,0.1)"/>
<circle cx="472" cy="286" r="7" fill="rgba(255,255,255,0.3)"/>

<!-- Row 4: Code - OFF -->
<rect x="72" y="316" width="452" height="48" rx="8" fill="rgba(255,255,255,0.03)"/>
<circle cx="96" cy="340" r="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
<text x="118" y="337" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500">Execute code changes</text>
<text x="118" y="352" fill="#555d6b" font-family="Inter, system-ui, sans-serif" font-size="11">Push commits and modify repositories</text>
<rect x="460" y="332" width="40" height="20" rx="10" fill="rgba(255,255,255,0.1)"/>
<circle cx="472" cy="342" r="7" fill="rgba(255,255,255,0.3)"/>

<!-- Right side: Visual boundary diagram -->
<rect x="596" y="72" width="503" height="300" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<text x="620" y="104" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Boundary Visualization</text>

<!-- Concentric circles showing scope -->
<circle cx="847" cy="240" r="120" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4 4"/>
<circle cx="847" cy="240" r="85" fill="none" stroke="rgba(0,188,235,0.2)" stroke-width="1.5"/>
<circle cx="847" cy="240" r="50" fill="rgba(0,188,235,0.08)" stroke="#00BCEB" stroke-width="2"/>

<!-- Labels -->
<text x="847" y="237" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Agent</text>
<text x="847" y="253" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Core Access</text>

<text x="847" y="142" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" text-anchor="middle">Allowed Scope</text>
<text x="847" y="108" fill="#555d6b" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle">Restricted Zone</text>

<!-- Access points -->
<circle cx="797" cy="195" r="6" fill="#00BCEB"/>
<text x="780" y="185" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Calendar</text>
<circle cx="897" cy="195" r="6" fill="#00BCEB"/>
<text x="914" y="185" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Email</text>
<circle cx="770" cy="275" r="6" fill="rgba(255,255,255,0.2)"/>
<text x="753" y="290" fill="#555d6b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Finance</text>
<circle cx="924" cy="275" r="6" fill="rgba(255,255,255,0.2)"/>
<text x="941" y="290" fill="#555d6b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Code</text>
</svg>