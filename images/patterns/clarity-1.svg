<svg width="1147" height="420" viewBox="0 0 1147 420" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="#1a1d27"/><stop offset="100%" stop-color="#22263a"/></linearGradient>
  <linearGradient id="border" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="rgba(255,255,255,0.12)"/><stop offset="100%" stop-color="rgba(255,255,255,0.04)"/></linearGradient>
</defs>
<rect width="1147" height="420" rx="16" fill="url(#bg)"/>
<rect x="0.5" y="0.5" width="1146" height="419" rx="15.5" stroke="url(#border)"/>

<text x="48" y="52" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" letter-spacing="1.5">INLINE REASONING</text>

<!-- Agent response with reasoning -->
<rect x="48" y="72" width="1051" height="300" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

<!-- Agent avatar and message -->
<circle cx="80" cy="104" r="16" fill="rgba(0,188,235,0.15)" stroke="#00BCEB" stroke-width="1.5"/>
<text x="80" y="109" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" font-weight="700">AI</text>
<text x="106" y="100" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">Agent</text>
<text x="106" y="116" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Just now</text>

<text x="80" y="148" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="14">I recommend moving the product launch to Q3. Here's my reasoning:</text>

<!-- Reasoning steps -->
<rect x="80" y="168" width="980" height="180" rx="10" fill="rgba(0,188,235,0.04)" stroke="rgba(0,188,235,0.12)" stroke-width="1"/>
<text x="104" y="192" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">Reasoning Chain</text>

<!-- Step 1 -->
<circle cx="116" cy="220" r="10" fill="rgba(0,188,235,0.15)"/>
<text x="116" y="224" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" font-weight="600">1</text>
<text x="136" y="224" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="13">Market analysis shows competitor launches clustered in Q2</text>
<text x="136" y="240" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Source: Market Intelligence Report, March 2026</text>

<!-- Step 2 -->
<circle cx="116" cy="268" r="10" fill="rgba(0,188,235,0.15)"/>
<text x="116" y="272" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" font-weight="600">2</text>
<text x="136" y="272" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="13">Engineering velocity data indicates 3 critical features need 6 more weeks</text>
<text x="136" y="288" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Source: Sprint velocity tracker, Jira backlog analysis</text>

<!-- Step 3 -->
<circle cx="116" cy="316" r="10" fill="rgba(0,188,235,0.15)"/>
<text x="116" y="320" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="11" text-anchor="middle" font-weight="600">3</text>
<text x="136" y="320" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="13">Historical data: Q3 launches have 23% higher adoption rates in enterprise</text>
<text x="136" y="336" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">Source: Internal analytics, 2023–2025 launch data</text>

<!-- Connecting lines -->
<line x1="116" y1="230" x2="116" y2="258" stroke="rgba(0,188,235,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="116" y1="278" x2="116" y2="306" stroke="rgba(0,188,235,0.2)" stroke-width="1" stroke-dasharray="3 3"/>

<!-- Confidence badge -->
<rect x="900" y="178" width="140" height="28" rx="6" fill="rgba(52,199,89,0.1)" stroke="rgba(52,199,89,0.3)" stroke-width="1"/>
<text x="970" y="197" fill="#34c759" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Confidence: 87%</text>
</svg>