<svg width="1147" height="420" viewBox="0 0 1147 420" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="#1a1d27"/><stop offset="100%" stop-color="#22263a"/></linearGradient>
  <linearGradient id="border" x1="0" y1="0" x2="1147" y2="420"><stop offset="0%" stop-color="rgba(255,255,255,0.12)"/><stop offset="100%" stop-color="rgba(255,255,255,0.04)"/></linearGradient>
</defs>
<rect width="1147" height="420" rx="16" fill="url(#bg)"/>
<rect x="0.5" y="0.5" width="1146" height="419" rx="15.5" stroke="url(#border)"/>

<text x="48" y="52" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" letter-spacing="1.5">DECISION TRAIL</text>

<rect x="48" y="72" width="1051" height="300" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
<text x="72" y="104" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600">Decision Flow Visualization</text>
<text x="72" y="124" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="12">Trace how the agent arrived at its final recommendation</text>

<!-- Decision flow nodes -->
<!-- Start node -->
<rect x="72" y="160" width="160" height="60" rx="8" fill="rgba(0,188,235,0.08)" stroke="#00BCEB" stroke-width="1.5"/>
<text x="152" y="186" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Input Query</text>
<text x="152" y="206" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">"Best deployment strategy"</text>

<!-- Arrow 1 -->
<line x1="232" y1="190" x2="280" y2="190" stroke="rgba(0,188,235,0.3)" stroke-width="1.5"/>
<polygon points="280,186 288,190 280,194" fill="rgba(0,188,235,0.3)"/>

<!-- Analysis node -->
<rect x="290" y="148" width="180" height="84" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="380" y="172" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Context Analysis</text>
<text x="380" y="192" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Evaluated 3 options:</text>
<text x="380" y="208" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Blue-green, Canary, Rolling</text>
<text x="380" y="224" fill="#34c759" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Confidence: 78%</text>

<!-- Arrow 2 -->
<line x1="470" y1="190" x2="518" y2="190" stroke="rgba(0,188,235,0.3)" stroke-width="1.5"/>
<polygon points="518,186 526,190 518,194" fill="rgba(0,188,235,0.3)"/>

<!-- Decision node -->
<rect x="528" y="148" width="180" height="84" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text x="618" y="172" fill="#e0e4ec" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500" text-anchor="middle">Decision Point</text>
<text x="618" y="192" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Selected: Canary deploy</text>
<text x="618" y="208" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Reason: Lowest risk for</text>
<text x="618" y="224" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">current traffic patterns</text>

<!-- Arrow 3 -->
<line x1="708" y1="190" x2="756" y2="190" stroke="rgba(0,188,235,0.3)" stroke-width="1.5"/>
<polygon points="756,186 764,190 756,194" fill="rgba(0,188,235,0.3)"/>

<!-- Output node -->
<rect x="766" y="160" width="160" height="60" rx="8" fill="rgba(52,199,89,0.08)" stroke="#34c759" stroke-width="1.5"/>
<text x="846" y="186" fill="#34c759" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Recommendation</text>
<text x="846" y="206" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">Canary deployment</text>

<!-- Rejected paths shown below -->
<text x="72" y="272" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500">Alternatives Considered</text>

<rect x="72" y="288" width="316" height="60" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4 4"/>
<text x="92" y="312" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="12">Blue-Green Deploy</text>
<text x="92" y="332" fill="#555d6b" font-family="Inter, system-ui, sans-serif" font-size="11">Rejected: Requires double infrastructure cost</text>

<rect x="408" y="288" width="316" height="60" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4 4"/>
<text x="428" y="312" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="12">Rolling Update</text>
<text x="428" y="332" fill="#555d6b" font-family="Inter, system-ui, sans-serif" font-size="11">Rejected: No quick rollback capability</text>

<!-- Why box -->
<rect x="744" y="272" width="334" height="84" rx="8" fill="rgba(0,188,235,0.04)" stroke="rgba(0,188,235,0.1)" stroke-width="1"/>
<text x="764" y="296" fill="#00BCEB" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Why Canary?</text>
<text x="764" y="316" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">• Gradual rollout reduces blast radius</text>
<text x="764" y="334" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">• Matches team's current monitoring setup</text>
<text x="764" y="352" fill="#8b95a5" font-family="Inter, system-ui, sans-serif" font-size="11">• Easy automatic rollback on error thresholds</text>
</svg>